name: Feature Request
description: Propose a new idea for the project
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature!
  - type: checkboxes
    id: checks
    attributes:
      label: Prerequisite Check
      options:
        - label: I have searched existing Issues to ensure there is no duplicate or similar feature request.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: Is this feature request related to a problem? Please clearly describe the existing issue or inconvenience.
      placeholder: When I..., I am always troubled because...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Desired Solution
      description: A clear and concise description of the solution or feature you would like.
      placeholder: I hope the project could provide...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Describe any alternative solutions or features you have considered.
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
